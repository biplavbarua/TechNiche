name: Keep Backend Awake

on:
  schedule:
    # Run every 14 minutes to prevent Render free tier from sleeping (which happens after 15 mins of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          echo "Pinging backend to keep it awake..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://legal-ai-backend-z9va.onrender.com/)
          echo "Backend returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Warning: Backend did not return 200 OK. It returned $HTTP_STATUS."
            exit 0 # We don't fail the action on 503, just record it, as the ping itself triggers activity
          else
            echo "Success: Backend is awake!"
          fi
